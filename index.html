<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>actives</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #0E1117; color: white; font-family: sans-serif; margin: 20px; }
        .card { background: #161B22; border: 1px solid #30363D; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        h1 { color: #00FFA3; }
        input, button { padding: 10px; border-radius: 8px; border: none; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #00FFA3; color: black; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #30363D; }
        .price-up { color: #00FFA3; }
    </style>
</head>
<body>
    <h1>📈 actives</h1>
    
    <div class="card">
        <h3>Общий баланс: <span id="total-balance">0</span> ₽</h3>
        <div id="tester-chart" style="height: 300px;"></div>
    </div>

    <div class="card">
        <h3>Добавить актив</h3>
        <input type="text" id="ticker" placeholder="Тикер (напр. YDEX)">
        <input type="number" id="amount" placeholder="Количество">
        <button onclick="addAsset()">Добавить</button>
    </div>

    <div class="card">
        <table>
            <thead><tr><th>Тикер</th><th>Цена</th><th>Сумма</th></tr></thead>
            <tbody id="asset-table"></tbody>
        </table>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [{t: 'YDEX', q: 10}];

        async function getPrice(ticker) {
            try {
                const response = await fetch(`https://iss.moex.com/iss/engines/stock/markets/shares/boards/TQBR/securities/${ticker}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                const data = await response.json();
                return data.marketdata.data[0][0] || 0;
            } catch { return 0; }
        }

        async function updateUI() {
            let total = 0;
            let labels = [];
            let values = [];
            const tableBody = document.getElementById('asset-table');
            tableBody.innerHTML = '';

            for (let item of portfolio) {
                const price = await getPrice(item.t);
                const sum = price * item.q;
                total += sum;
                labels.push(item.t);
                values.push(sum);

                tableBody.innerHTML += `<tr><td>${item.t}</td><td>${price} ₽</td><td>${sum.toFixed(2)} ₽</td></tr>`;
            }

            document.getElementById('total-balance').innerText = total.toLocaleString();
            
            Plotly.newPlot('tester-chart', [{
                values: values,
                labels: labels,
                type: 'pie',
                hole: .6,
                marker: { colors: ['#00FFA3', '#007BFF', '#FF0055'] }
            }], {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: false,
                margin: {t:0, b:0, l:0, r:0}
            });
        }

        function addAsset() {
            const t = document.getElementById('ticker').value.toUpperCase();
            const q = document.getElementById('amount').value;
            if(t && q) {
                portfolio.push({t, q: parseFloat(q)});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
